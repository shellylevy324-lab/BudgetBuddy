<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Activities | Buddy Skills</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="platform.css">
</head>
<body class="platform-page">
    <header class="platform-header">
        <div class="platform-header-inner">
            <h1 class="platform-name">Buddy Skills</h1>
            <p class="platform-tagline">Growing Skills. Building Independence.</p>
        </div>
    </header>

    <main class="page-shell">
        <nav class="platform-page-nav" aria-label="Student activity navigation">
            <a class="platform-back-link" href="classroom.html">← Back to Classroom</a>
        </nav>
        <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>

        <section class="card identity-card" aria-labelledby="welcomeMessage">
            <div>
                <h2 id="welcomeMessage" class="page-title">Welcome</h2>
                <div class="identity-details">
                    <div class="identity-field">
                        <p class="role-label">Student</p>
                        <p id="traineeName" class="role-name">Loading...</p>
                    </div>
                    <div class="identity-field">
                        <p class="role-label">Job Coach</p>
                        <p id="jobCoachName" class="role-name">Loading...</p>
                    </div>
                </div>
            </div>

            <div id="traineePhotoWrap" class="trainee-photo-wrap" aria-label="Student profile photo">
                <span class="trainee-photo-placeholder" aria-hidden="true">BS</span>
            </div>
        </section>

        <section class="card" aria-labelledby="availableTrainingHeading">
            <h2 id="availableTrainingHeading" class="section-title">Choose an Activity</h2>
            <div id="trainingGrid" class="training-grid">
                <p class="empty-message">Loading activities...</p>
            </div>
        </section>
    </main>

    <script src="training-station.js"></script>
</body>
</html>
