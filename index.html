<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Buddy Skills teacher portal for functional transition instruction.">
  <title>Buddy Skills | Teacher Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="platform.css">
  <style>
    .entry-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(145deg, #f5fbf8 0%, #eef5fb 100%);
    }
    .entry-card {
      width: min(620px, 100%);
      text-align: center;
      padding: clamp(32px, 7vw, 64px);
    }
    .entry-mark {
      width: 74px;
      height: 74px;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      border-radius: 22px;
      background: #e7f4ee;
      font-size: 36px;
    }
    .entry-card h1 { margin-bottom: 8px; }
    .entry-tagline { margin: 0 0 10px; font-weight: 600; }
    .entry-copy { max-width: 470px; margin: 0 auto 28px; }
    .entry-actions { display: grid; gap: 12px; max-width: 330px; margin: 0 auto; }
    .entry-note { margin: 22px 0 0; font-size: .9rem; }
  </style>
</head>
<body class="platform-page entry-page">
  <main class="card entry-card">
    <div class="entry-mark" aria-hidden="true">★</div>
    <p class="platform-kicker">Buddy Skills</p>
    <h1>Teacher Center</h1>
    <p class="entry-tagline">Growing Skills. Building Independence.</p>
    <p class="entry-copy">Sign in to manage students, instructional settings, reinforcement packages, reports, and activity access.</p>
    <div class="entry-actions">
      <a class="platform-button platform-button-full" href="teacher-center.html">Open Teacher Center</a>
    </div>
    <p class="entry-note">Student activities are launched by staff from the selected student profile.</p>
  </main>
  <script>
    // Keep the root URL as the platform entry point while sending returning staff
    // directly to the secure Teacher Center.
    window.setTimeout(function () {
      window.location.replace("teacher-center.html");
    }, 900);
  </script>
</body>
</html>
